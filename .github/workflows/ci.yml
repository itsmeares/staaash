name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://staaash:staaash@localhost:5432/staaash
      UPLOAD_LOCATION: ./.data/files
      AUTH_SECRET: ci-placeholder-secret-should-not-be-used-in-production

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Enable Corepack
        run: corepack enable

      - name: Install pinned pnpm
        run: corepack install

      - name: Print pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build @staaash/db
        run: pnpm --filter @staaash/db build

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Fallow new-code gate
        run: pnpm quality:fallow

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
