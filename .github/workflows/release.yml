name: Release

on:
  push:
    tags:
      - "v*"
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Verify release versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const packageFiles = [
            "package.json",
            "apps/web/package.json",
            "apps/worker/package.json",
            "packages/config/package.json",
            "packages/db/package.json",
          ];
          const mismatches = packageFiles.flatMap((file) => {
            const version = JSON.parse(fs.readFileSync(file, "utf8")).version;
            return version === tagVersion
              ? []
              : [`${file} has ${version}; expected ${tagVersion}`];
          });

          if (mismatches.length > 0) {
            console.error(mismatches.join("\n"));
            process.exit(1);
          }
          NODE

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/itsmeares/staaash
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release view "$TAG" >/dev/null 2>&1 && echo "Release already exists, skipping." || \
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --draft \
            $PRERELEASE_FLAG \
            docker-compose.yml \
            example.env
