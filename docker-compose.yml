name: staaash

services:
  staaash:
    container_name: staaash_server
    image: ghcr.io/itsmeares/staaash:${STAAASH_VERSION:-latest}

    environment:
      NODE_ENV: production
      PORT: "2113"
      STAAASH_VERSION: ${STAAASH_VERSION:-latest}
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD}@db:5432/${DB_DATABASE_NAME:-staaash}
      UPLOAD_LOCATION: /data/files
      SECURE_COOKIES: "${SECURE_COOKIES:-}"
      STAAASH_PUBLIC_URL: "${STAAASH_PUBLIC_URL:-}"

    volumes:
      - ${UPLOAD_LOCATION:-./library}:/data/files

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "2113:2113"

    restart: always

    networks:
      - staaash_net

  worker:
    container_name: staaash_worker
    image: ghcr.io/itsmeares/staaash:${STAAASH_VERSION:-latest}

    command:
      - node
      - /worker/dist/index.js

    environment:
      NODE_ENV: production
      STAAASH_VERSION: ${STAAASH_VERSION:-latest}
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD}@db:5432/${DB_DATABASE_NAME:-staaash}
      UPLOAD_LOCATION: /data/files

    volumes:
      - ${UPLOAD_LOCATION:-./library}:/data/files

    depends_on:
      db:
        condition: service_healthy

    restart: always

    networks:
      - staaash_net

  db:
    container_name: staaash_postgres
    image: postgres:18-alpine

    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME:-staaash}

    volumes:
      - ${DB_DATA_LOCATION:-./postgres}:/var/lib/postgresql

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE_NAME:-staaash}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: always

    networks:
      - staaash_net

networks:
  staaash_net:
    driver: bridge

x-casaos:
  id: io.github.itsmeares.staaash
  main: staaash

  title:
    en_US: Staaash

  tagline:
    en_US: Self-hosted personal cloud drive

  description:
    en_US: A private, self-hosted personal cloud drive for storing and sharing files.

  icon: https://raw.githubusercontent.com/itsmeares/staaash/main/apps/web/public/favicon-64.png

  category: Productivity
  author: itsmeares
  developer: itsmeares

  index: /
  port_map: "2113"
  scheme: http
